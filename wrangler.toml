name = "track-log"
main = "worker.js"
compatibility_date = "2024-01-01"

# R2 bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "tracklog-videos"

# ─────────────────────────────────────────────────────────────
# DO NOT add your secrets here — this file is public on GitHub.
# Set these three variables in the Cloudflare dashboard instead:
#
#   Workers → tracklog-upload → Settings → Variables
#
#   UPLOAD_SECRET     = any random string you choose
#   ALLOWED_ORIGIN    = https://YOUR_USERNAME.github.io
#   R2_PUBLIC_DOMAIN  = pub-XXXX.r2.dev  (from your R2 bucket settings)
# ─────────────────────────────────────────────────────────────
