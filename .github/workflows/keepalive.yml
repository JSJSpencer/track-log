# .github/workflows/keepalive.yml
# Pings your Supabase project once daily to prevent free tier pausing.
# No setup needed beyond adding your Supabase URL as a GitHub secret.

name: Supabase Keepalive

on:
  schedule:
    - cron: '0 12 * * *'  # Runs every day at 12:00 UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✓ Project is alive"
          else
            echo "✗ Unexpected response — check your secrets"
            exit 1
          fi
